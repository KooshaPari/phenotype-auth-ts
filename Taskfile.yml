version: '3'
tasks:
  install:
    desc: Install dependencies
    cmds:
      - bun install
  build:
    desc: Build the TypeScript project
    cmds:
      - bun run build
  test:
    desc: Run the test suite
    cmds:
      - bun run test
  lint:
    desc: Run static type checks
    cmds:
      - bun run typecheck
  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist coverage .vitepress/dist
