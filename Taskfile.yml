version: "3"

vars:
  PACKAGE_RUNNER:
    sh: |
      if [ -f bun.lock ] && command -v bun >/dev/null 2>&1; then
        echo bun
      else
        echo npm
      fi

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - "{{.PACKAGE_RUNNER}} install"

  build:
    desc: Build the TypeScript package
    cmds:
      - "{{.PACKAGE_RUNNER}} run build"

  test:
    desc: Run the test suite
    cmds:
      - "{{.PACKAGE_RUNNER}} run test"

  lint:
    desc: Run TypeScript checks
    cmds:
      - "{{.PACKAGE_RUNNER}} run typecheck"

  typecheck:
    desc: Run the TypeScript compiler without emitting files
    cmds:
      - "{{.PACKAGE_RUNNER}} run typecheck"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist coverage .vitepress/dist docs/.vitepress/dist
